<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luz Neon Party</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
      touch-action: manipulation;
    }
    h1 {
      color: white;
      margin-bottom: 30px;
      text-shadow: 0 0 20px #ff00ff;
    }
    .controls {
      position: absolute;
      bottom: 40px;
      width: 90%;
      text-align: center;
    }
    button {
      padding: 15px 20px;
      margin: 6px;
      font-size: 16px;
      border: none;
      border-radius: 50px;
      color: white;
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 15px rgba(255,0,255,0.5);
    }
    button:active {
      transform: scale(0.95);
    }
    #stop {
      background: #ff0000;
    }
    .info {
      position: absolute;
      top: 20px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="info">Toque na tela para flash rápido</div>
  <h1>Luz Neon Party</h1>

  <div class="controls">
    <button onclick="strobe()">⚡ Strobe Rápido</button>
    <button onclick="rainbow()">🌈 Arco-íris</button>
    <button onclick="neonPulse()">💖 Neon Pulse</button>
    <button onclick="police()">🚨 Police Lights</button>
    <button onclick="randomFlash()">🎲 Aleatório</button>
    <button onclick="lanterna()">🔦 Lanterna Full</button>
    <button id="stop" onclick="stopAll()">⛔ Parar Tudo</button>
  </div>

  <script>
    let interval = null;
    let wakeLock = null;

    function changeColor(color) {
      document.body.style.background = color;
    }

    function stopAll() {
      clearInterval(interval);
      document.body.style.background = "black";
    }

    function strobe() {
      stopAll();
      let on = true;
      interval = setInterval(() => {
        document.body.style.background = on ? "#ffffff" : "#000000";
        on = !on;
      }, 40);
    }

    function rainbow() {
      stopAll();
      let hue = 0;
      interval = setInterval(() => {
        hue = (hue + 4) % 360;
        document.body.style.background = `hsl(${hue}, 100%, 50%)`;
      }, 25);
    }

    function neonPulse() {
      stopAll();
      let colors = ["#ff00ff", "#00ffff", "#ffff00", "#ff0088"];
      let i = 0;
      interval = setInterval(() => {
        changeColor(colors[i]);
        i = (i + 1) % colors.length;
      }, 180);
    }

    function police() {
      stopAll();
      let on = true;
      interval = setInterval(() => {
        document.body.style.background = on ? "#ff0000" : "#0000ff";
        on = !on;
      }, 80);
    }

    function randomFlash() {
      stopAll();
      interval = setInterval(() => {
        const r = Math.floor(Math.random() * 255);
        const g = Math.floor(Math.random() * 255);
        const b = Math.floor(Math.random() * 255);
        document.body.style.background = `rgb(\( {r}, \){g},${b})`;
      }, 60);
    }

    function lanterna() {
      stopAll();
      document.body.style.background = "#ffffff";
      document.documentElement.requestFullscreen().catch(() => {});
      
      // Tenta manter a tela ligada
      if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').then(lock => wakeLock = lock);
      }
    }

    // Flash rápido ao tocar na tela
    document.body.addEventListener('touchstart', () => {
      const original = document.body.style.background;
      document.body.style.background = "#ffffff";
      setTimeout(() => {
        document.body.style.background = original || "black";
      }, 80);
    });
  </script>
</body>
</html>
