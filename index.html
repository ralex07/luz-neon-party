<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Luz Neon Party</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.1s;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .container {
      text-align: center;
      z-index: 10;
    }
    h1 {
      color: white;
      margin-bottom: 40px;
      font-size: 2.5em;
      text-shadow: 0 0 20px currentColor;
    }
    .controls {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      padding: 0 20px;
    }
    button {
      padding: 16px 24px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      color: white;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      min-width: 140px;
    }
    button:active {
      transform: scale(0.95);
    }
    .info {
      position: fixed;
      top: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="info">Toque nos botões abaixo ↓</div>
  <div class="container">
    <h1 id="title">NEON PARTY</h1>
  </div>

  <div class="controls">
    <button onclick="strobe()">⚡ STROBE</button>
    <button onclick="rainbow()">🌈 ARCO-ÍRIS</button>
    <button onclick="neon()">💖 NEON PULSE</button>
    <button onclick="randomFlash()">🎲 FLASH ALEATÓRIO</button>
    <button onclick="lanterna()">🔦 LANTERNA</button>
    <button onclick="stopAll()">⏹ PARAR</button>
  </div>

  <script>
    let interval;
    let audioContext;

    function changeColor(color) {
      document.body.style.background = color;
      document.getElementById('title').style.color = color === 'black' ? 'white' : '#fff';
    }

    function strobe() {
      stopAll();
      let on = true;
      interval = setInterval(() => {
        document.body.style.background = on ? '#ffffff' : '#000000';
        on = !on;
      }, 40);
    }

    function rainbow() {
      stopAll();
      let hue = 0;
      interval = setInterval(() => {
        hue = (hue + 6) % 360;
        const color = `hsl(${hue}, 100%, 55%)`;
        document.body.style.background = color;
      }, 25);
    }

    function neon() {
      stopAll();
      let colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff0088', '#00ff88'];
      let i = 0;
      interval = setInterval(() => {
        changeColor(colors[i]);
        i = (i + 1) % colors.length;
      }, 180);
    }

    function randomFlash() {
      stopAll();
      interval = setInterval(() => {
        const randomColor = '#' + Math.floor(Math.random()*16777215).toString(16);
        document.body.style.background = randomColor;
      }, 80);
    }

    function stopAll() {
      if (interval) clearInterval(interval);
      document.body.style.background = 'black';
    }

    function lanterna() {
      stopAll();
      if ('wakeLock' in navigator) {
        navigator.wakeLock.request('screen').then(() => {
          alert('🔦 Modo lanterna ativado! Gire o brilho no máximo.');
        });
      }
      document.documentElement.requestFullscreen().catch(() => {});
      alert('🔦 Tela cheia + brilho máximo = lanterna!');
    }

    // Toque na tela para flash rápido
    document.body.addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') {
        const flash = document.createElement('div');
        flash.style.position = 'fixed';
        flash.style.top = '0';
        flash.style.left = '0';
        flash.style.width = '100%';
        flash.style.height = '100%';
        flash.style.background = 'white';
        flash.style.opacity = '0.8';
        flash.style.transition = 'opacity 0.1s';
        document.body.appendChild(flash);
        setTimeout(() => flash.style.opacity = '0', 50);
        setTimeout(() => flash.remove(), 200);
      }
    });
  </script>
</body>
</html>
